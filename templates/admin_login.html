<!doctype html>
<html lang="es">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Acceso Administrador</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<main class="raffle-page">

    <section class="panel">

        <h1>
            🔐 Panel de administración
        </h1>

        <p>
            Ingresa tus datos para continuar.
        </p>


        {% with messages = get_flashed_messages() %}

            {% if messages %}

                <div class="notice">

                    {% for message in messages %}

                        {{ message }}

                    {% endfor %}

                </div>

            {% endif %}

        {% endwith %}


        <form method="post">

            <label>
                Usuario
            </label>

            <input
                type="text"
                name="username"
                placeholder="Usuario"
                required
            >


            <label>
                Contraseña
            </label>

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
            >


            <button
                class="button"
                type="submit"
            >
                🔑 Entrar
            </button>

        </form>

    </section>

</main>

</body>

</html>
